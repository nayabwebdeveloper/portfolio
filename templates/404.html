<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The page you are looking for could not be found.">
    <meta name="author" content="Nayab Ali">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Page Not Found | Nayab Ali</title>
    <link rel="icon" href="{{ url_for('static', filename='image/favicon.ico') }}" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='image/favicon-32x32.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='image/apple-touch-icon.png') }}">
</head>
<body>
    {% extends "index.html" %}
    {% block content %}

    <section class="hero error-page">

        <div class="status">
            <span class="status-dot"></span>
            ERROR 404
        </div>

        <h1>Page <span class="italic">Not Found</span></h1>

        <p class="tagline">Oops! The page you're looking for doesn't exist or may have been moved.
        </p>

        <div class="actions">
            <a href="{{ url_for('home') }}" class="btn btn-primary">
                Back to Home
            </a>

            <a href="{{ url_for('projects') }}" class="btn btn-secondary">
                View Projects
            </a>
        </div>

    </section>

    {% endblock %}


    {% block code %}
        <script>
            // Hamburger menu
            const menuBtn = document.getElementById('menuBtn');
            const drawer = document.getElementById('mobileDrawer');
            menuBtn.addEventListener('click', () => {
                const isOpen = drawer.classList.toggle('open');
                menuBtn.classList.toggle('open', isOpen);
                document.body.style.overflow = isOpen ? 'hidden' : '';
            });
            drawer.querySelectorAll('a').forEach(a => {
                a.addEventListener('click', () => {
                    drawer.classList.remove('open');
                    menuBtn.classList.remove('open');
                    document.body.style.overflow = '';
                });
            });

            // Custom cursor
            const cursor = document.getElementById('cursor');
            const ring   = document.getElementById('cursorRing');
            let mx = 0, my = 0, rx = 0, ry = 0;
            document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            cursor.style.left = mx + 'px';
            cursor.style.top  = my + 'px';
            });
            (function animateRing() {
            rx += (mx - rx) * 0.12;
            ry += (my - ry) * 0.12;
            ring.style.left = rx + 'px';
            ring.style.top  = ry + 'px';
            requestAnimationFrame(animateRing);
            })();
            document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
            });

            // Scroll reveal
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
            });
            }, { threshold: 0.1 });
            reveals.forEach(el => observer.observe(el));
            setTimeout(() => {
            reveals.forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight) el.classList.add('visible');
            });
            }, 100);
            
        </script>
    {% endblock %}
</body>
</html>
